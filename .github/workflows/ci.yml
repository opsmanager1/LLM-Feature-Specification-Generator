name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  flake8:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run flake8
        run: |
          PYTHONPATH=$(pwd) flake8 .

  tests:
    runs-on: ubuntu-latest
    env:
      TEST_REDIS_URL: ${{ secrets.TEST_REDIS_URL }}
      TEST_DB_NAME: ${{ secrets.TEST_DB_BASE_NAME }}
      TEST_DB_USER: ${{ secrets.TEST_DB_USER }}
      TEST_DB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ${{ secrets.TEST_DB_BASE_NAME }}
          POSTGRES_USER: ${{ secrets.TEST_DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install pytest-cov

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432 -U $TEST_DB_USER -d $TEST_DB_NAME; do
            sleep 1
          done

      - name: Run tests
        run: |
          pytest --cov=app
