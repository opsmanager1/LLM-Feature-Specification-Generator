services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: specification-generator-app
    init: true
    env_file:
      - .env
    ports:
      - "8001:8001"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    stop_grace_period: 20s
    restart: unless-stopped
