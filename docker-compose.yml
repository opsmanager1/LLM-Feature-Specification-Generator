services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: specification-generator-app
    init: true
    env_file:
      - .env
    ports:
      - "8001:8001"
    depends_on:
      - ollama
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=2)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    stop_grace_period: 20s
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: specification-generator-ollama
    init: true
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test:
        [
          "CMD",
          "ollama",
          "list",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  ollama:
